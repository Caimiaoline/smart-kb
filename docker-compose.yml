version: '3.8'
services:
  db:
    image: ankane/pgvector:latest # 这是一个专门带了向量扩展的镜像
    container_name: smart-assistant-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: smart_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123 # 可以改密码
    volumes:
      - ./postgres-data:/var/lib/postgresql/data