server:
  port: 8082
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 12345zxcvb
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

# RAG 向量与 Embedding
embedding:
  model:
    api-key: ${EMBEDDING_API_KEY:}
    base-url: ${EMBEDDING_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
    model-name: ${EMBEDDING_MODEL_NAME:Embedding-3}
    dimensions: ${EMBEDDING_DIMENSIONS:1024}

# RAG 最终回答生成模型，兼容 OpenAI 风格接口
chat:
  model:
    api-key: ${CHAT_API_KEY:${EMBEDDING_API_KEY:}}
    base-url: ${CHAT_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
    model-name: ${CHAT_MODEL_NAME:glm-4.7}
    temperature: ${CHAT_TEMPERATURE:0.2}
    dimensions: 1024